<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원 정보 수정 페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f2f2f2;
      --card: #ffffff;
      --line: #d9d9d9;
      --text: #333333;
      --muted: #777777;
      --brand: #2ec5e8;
      --brand-dark: #18b6da;
      --topbar: #34c3a0;
      --shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      --radius: 12px;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .topbar {
      width: 100%;
      background: var(--topbar);
      color: white;
      text-align: center;
      padding: 18px 12px;
      font-weight: 700;
    }

    .page {
      width: min(1000px, calc(100% - 32px));
      margin: 22px auto 40px;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 0 18px;
      border-bottom: 2px solid #8fd7c7;
      margin-bottom: 16px;
    }

    .nav a {
      text-decoration: none;
      color: #444;
      border: 1px solid #cfcfcf;
      background: white;
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 4px;
    }

    .nav a.active {
      background: #f7f7f7;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      margin-bottom: 22px;
    }

    .card h2 {
      margin: 0 0 26px;
      text-align: center;
      font-size: 34px;
    }

    .info-layout {
      display: flex;
      gap: 42px;
      align-items: flex-start;
    }

    .left-panel {
      width: 42%;
      min-width: 280px;
      text-align: center;
    }

    .right-panel {
      flex: 1;
      min-width: 280px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .profile-img {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto 20px;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.18);
    }

    .intro-wrap {
      margin-top: 6px;
    }

    .input-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      width: 100%;
    }

    textarea,
    input[type="text"],
    input[type="email"],
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #fafafa;
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 4px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 56px;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      font-family: inherit;
    }

    .btn {
      border: none;
      background: var(--brand);
      color: white;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
      border-top-right-radius: 4px;
      border-bottom-right-radius: 4px;
      min-width: 84px;
    }

    .btn:hover {
      background: var(--brand-dark);
    }

    .choice-group {
      margin-bottom: 46px;
      text-align: center;
    }

    .option-list {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 14px;
      color: #555;
    }

    .option-list label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 150px 1fr auto;
      gap: 14px 16px;
      align-items: center;
    }

    .form-grid label {
      font-size: 15px;
      font-weight: 700;
      color: #555;
    }

    .readonly {
      background: #eceff2;
      color: #666;
    }

    .inline-options {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      min-height: 44px;
      align-items: center;
    }

    .inline-options label {
      font-weight: 400;
      font-size: 14px;
      color: #555;
    }

    .field-btn {
      align-self: stretch;
      padding: 0 16px;
      min-width: 84px;
      border-radius: 4px;
      border: none;
      background: var(--brand);
      color: white;
      cursor: pointer;
      height: 44px;
    }

    .field-btn:hover {
      background: var(--brand-dark);
    }

    .spacer {
      visibility: hidden;
    }

    @media (max-width: 767px) {
      .page {
        width: min(520px, calc(100% - 20px));
      }

      .card {
        padding: 22px 16px 18px;
      }

      .card h2 {
        font-size: 28px;
        margin-bottom: 20px;
      }

      .nav {
        flex-wrap: wrap;
      }

      .info-layout {
        flex-direction: column;
        gap: 26px;
      }

      .left-panel,
      .right-panel {
        width: 100%;
        min-width: 0;
      }

      .profile-img {
        width: 210px;
        height: 210px;
      }

      .choice-group {
        margin-bottom: 26px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .field-btn,
      .spacer {
        width: 100%;
      }

      textarea {
        border-radius: 4px 4px 0 0;
      }

      .btn {
        border-radius: 0 0 4px 4px;
        min-height: 44px;
      }

      .input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">홍길동님의 프로필 페이지</header>

  <main class="page">
    <nav class="nav">
      <a href="#basic-info" class="active">기본 정보 수정</a>
      <a href="#portfolio">포트폴리오 수정</a>
    </nav>

    <section id="basic-info" class="card">
      <h2>기본 정보 수정</h2>

      <div class="info-layout">
        <div class="left-panel">
          <h3 class="section-title">프로필 사진</h3>
          <img
            class="profile-img"
            src="thumb_d_909D06F3A7A99F2AE4FDEF78E71969C6.png"
            alt="프로필 사진"
          />

          <div class="intro-wrap">
            <h3 class="section-title">자기 소개</h3>
            <div class="input-row">
              <textarea placeholder="자기 소개를 입력해주세요">안녕하세요. 저는 가치 투자에 관심이 많습니다.</textarea>
              <button class="btn" type="button">Update</button>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="choice-group">
            <h3 class="section-title">투자상품 선호도</h3>
            <div class="option-list">
              <label><input type="checkbox" name="product" /> 주식</label>
              <label><input type="checkbox" name="product" checked /> 채권</label>
              <label><input type="checkbox" name="product" /> 부동산</label>
              <label><input type="checkbox" name="product" checked /> 가상 화폐</label>
            </div>
          </div>

          <div class="choice-group">
            <h3 class="section-title">투자 스타일</h3>
            <div class="option-list">
              <label><input type="radio" name="style" /> 안정형</label>
              <label><input type="radio" name="style" checked /> 중립형</label>
              <label><input type="radio" name="style" /> 공격적</label>
            </div>
          </div>

          <div class="choice-group">
            <h3 class="section-title">관심 종목</h3>
            <div class="option-list">
              <label><input type="checkbox" name="interest" /> 전기차</label>
              <label><input type="checkbox" name="interest" checked /> 소비재</label>
              <label><input type="checkbox" name="interest" checked /> 금융</label>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>회원 정보 출력</h2>

      <div class="form-grid">
        <label for="member-no">회원 번호</label>
        <input id="member-no" class="readonly" type="text" value="1" readonly />
        <div class="spacer">.</div>

        <label for="member-id">ID</label>
        <input id="member-id" class="readonly" type="text" value="HongGildong123" readonly />
        <div class="spacer">.</div>

        <label for="email">Email</label>
        <input id="email" type="email" value="HGildong@example.com" />
        <button class="field-btn" type="button">Update</button>

        <label for="nickname">Nickname</label>
        <input id="nickname" type="text" value="Gildong Hong" />
        <button class="field-btn" type="button">Update</button>

        <label for="age">나이</label>
        <input id="age" type="number" min="0" max="120" value="27" />
        <button class="field-btn" type="button">Update</button>

        <label for="asset">자산과 연봉</label>
        <input id="asset" type="number" min="0" step="100" value="50000000" placeholder="숫자만 입력" />
        <button class="field-btn" type="button">Update</button>
      </div>
    </section>

    <section id="portfolio" class="card">
      <h2>포트폴리오 수정</h2>

      <div class="form-grid">
        <label for="portfolio-no">회원 번호</label>
        <input id="portfolio-no" class="readonly" type="text" value="1" readonly />
        <div class="spacer">.</div>

        <label for="portfolio-id">ID</label>
        <input id="portfolio-id" class="readonly" type="text" value="HongGildong123" readonly />
        <div class="spacer">.</div>

        <label>저축 성향</label>
        <div class="inline-options">
          <label><input type="radio" name="saving" /> 도전형</label>
          <label><input type="radio" name="saving" checked /> 검소형</label>
          <label><input type="radio" name="saving" /> 여행형</label>
        </div>
        <button class="field-btn" type="button">Update</button>

        <label for="favorite-bank">최애 은행</label>
        <input id="favorite-bank" type="text" placeholder="가장 좋아하는 은행을 입력해주세요" value="국민은행" />
        <button class="field-btn" type="button">Update</button>
      </div>
    </section>
  </main>
</body>
</html>
