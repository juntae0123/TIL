<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    .card {
      width: 320px;
      border: 1px solid black;
      padding: 20px;
      box-sizing: border-box;
    }

    /* 이미지 + 이름을 같이 감싸는 부모 */
    .image-card {
      position: relative;   /* 이름 absolute의 기준 */
      width: 100%;
      margin-bottom: 20px;
    }

    .image-card img {
      display: block;
      width: 100%;          /* 부모 너비와 같게 */
      height: auto;
    }

    .image-card p {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;            /* 부모 기준 아래쪽 0px */
      margin: 0;
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      background-color: rgba(255, 200, 150, 0.8);
      padding: 8px 0;
    }

    .description {
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="image-card">
      <img src="profile.jpg" alt="Profile Image">
      <p>Name</p>
    </div>

    <p class="description">
      Lorem ipsum dolor sit amet consectetur adipisicing elit.
      Adipisci unde officiis ad nostrum. Laboriosam mollitia
      similique provident fuga tenetur saepe sit, amet eaque
      neque eius quaerat expedita ea illum veniam.
    </p>
  </div>
</body>
</html>
