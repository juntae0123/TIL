<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알라딘 베스트셀러</title>
</head>
<body>
    <h1>베스트 셀러 리스트</h1>
    <hr>
    {% for book in books %}
        <div>
            <p><strong>책 제목 :</strong> {{ book.title }}</p>
            <p><strong>저자 :</strong> {{ book.author }}</p>
            <p><strong>순위 정보 :</strong> {{ book.bestRank }}</p>
            <p>판매 지수 : {{ book.salesPoint }}</p>
            <hr>
        </div>
    {% empty %}
        <p>조회된 베스트셀러 데이터가 없습니다.</p>
    {% endfor %}
</body>
</html>
