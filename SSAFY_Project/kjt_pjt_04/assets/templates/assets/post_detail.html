<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <style>
        .card { border: 1px solid #ddd; padding: 18px; border-radius: 10px; background: #fff; max-width: 780px; }
        .meta { color: #666; margin-bottom: 14px; }
        .actions { margin-top: 20px; }
        .actions a, .actions button { margin-right: 12px; padding: 8px 14px; border: none; border-radius: 6px; text-decoration: none; color: #fff; }
        .btn-edit { background: #198754; }
        .btn-delete { background: #dc3545; }
        .btn-back { background: #6c757d; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'assets:asset_list' %}">자산 목록</a> &gt;
        <a href="{% url 'assets:asset_detail' asset.asset_id %}">{{ asset.name }}</a> &gt;
        글 보기
    </nav>

    <div class="card">
        <h1>{{ post.title }}</h1>
        <p class="meta">작성자: {{ post.author }} · 작성일: {{ post.created_at|date:'Y-m-d H:i' }} · 수정일: {{ post.updated_at|date:'Y-m-d H:i' }}</p>
        <div>
            <pre>{{ post.content }}</pre>
        </div>

        <div class="actions">
            <a class="btn-edit" href="{% url 'assets:post_update' asset.asset_id post.pk %}">수정</a>
            <form action="{% url 'assets:post_delete' asset.asset_id post.pk %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button class="btn-delete" type="submit">삭제</button>
            </form>
            <a class="btn-back" href="{% url 'assets:asset_detail' asset.asset_id %}">목록으로</a>
        </div>
    </div>
</body>
</html>
